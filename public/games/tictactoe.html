<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="https://image2url.com/r2/default/images/1773360165198-6e8b59b8-ece3-41af-bec4-d0f478f440c8.png">
<title>Tic-Tac-Toe - Evan's Dungeon</title>
<script>document.documentElement.setAttribute('data-theme', 'dark');</script>
<link rel="stylesheet" href="../css/style.css">
<style>
  body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
    background-attachment: fixed;
  }

  .game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .mode-select {
    display: flex;
    gap: 10px;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    width: 300px;
    height: 300px;
  }

  .cell {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    color: var(--text-heading);
    cursor: pointer;
    transition: all var(--transition);
    user-select: none;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    min-width: 0;
    min-height: 0;
  }

  .cell:hover:not(.taken) {
    background: var(--bg-card-hover);
    border-color: var(--border-light);
  }

  .cell.taken { cursor: default; }
  .cell.x { color: var(--accent); }
  .cell.o { color: var(--text-muted); }
  .cell.win { background: var(--accent-dim); border-color: var(--accent); }

  .status {
    font-size: 16px;
    color: var(--text-heading);
    min-height: 24px;
    font-family: 'Playfair Display', serif;
  }

  .scores-row {
    display: flex;
    gap: 32px;
    font-size: 14px;
    color: var(--text-muted);
  }

  .scores-row strong {
    color: var(--text-heading);
    margin-left: 4px;
  }
</style>
</head>

<main class="page">
  <div class="page-header">
    <h1>Tic-Tac-Toe</h1>
    <p>Play against a friend or the computer.</p>
  </div>

  <div class="game-container">
    <div class="mode-select">
      <button class="btn btn-primary" id="btnVsAI" onclick="setMode('ai')">vs Computer</button>
      <button class="btn btn-secondary" id="btnVs2P" onclick="setMode('2p')">2 Player</button>
    </div>

    <div class="status" id="status">X's turn</div>

    <div class="board" id="board"></div>

    <div class="scores-row">
      <span>X Wins<strong id="xWins">0</strong></span>
      <span>O Wins<strong id="oWins">0</strong></span>
      <span>Draws<strong id="draws">0</strong></span>
    </div>

    <button class="btn btn-secondary" onclick="resetGame()">New Game</button>
  </div>
</main>

<footer class="footer">Evan's Dungeon</footer>

<script>
  let board, turn, over, mode, scores;

  function init() {
    scores = { x: 0, o: 0, d: 0 };
    mode = 'ai';
    resetGame();
  }

  function setMode(m) {
    mode = m;
    document.getElementById('btnVsAI').className = 'btn ' + (m === 'ai' ? 'btn-primary' : 'btn-secondary');
    document.getElementById('btnVs2P').className = 'btn ' + (m === '2p' ? 'btn-primary' : 'btn-secondary');
    scores = { x: 0, o: 0, d: 0 };
    updateScores();
    resetGame();
  }

  function resetGame() {
    board = Array(9).fill('');
    turn = 'X';
    over = false;
    document.getElementById('status').textContent = "X's turn";
    render();
  }

  function render() {
    const el = document.getElementById('board');
    el.innerHTML = '';
    board.forEach((v, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell' + (v ? ' taken ' + v.toLowerCase() : '');
      cell.textContent = v;
      cell.addEventListener('click', () => play(i));
      el.appendChild(cell);
    });
  }

  function play(i, isAI) {
    if (over || board[i]) return;
    if (mode === 'ai' && turn === 'O' && !isAI) return;

    board[i] = turn;
    render();

    const win = checkWin(turn);
    if (win) {
      endRound(turn, win);
      return;
    }
    if (board.every(c => c)) {
      endRound('draw');
      return;
    }

    turn = turn === 'X' ? 'O' : 'X';
    document.getElementById('status').textContent = turn + "'s turn";

    if (mode === 'ai' && turn === 'O') {
      setTimeout(aiMove, 300);
    }
  }

  function aiMove() {
    if (over) return;
    // Try to win
    let move = findWinMove('O');
    // Block player
    if (move === -1) move = findWinMove('X');
    // Center
    if (move === -1 && !board[4]) move = 4;
    // Random corner
    if (move === -1) {
      const corners = [0,2,6,8].filter(i => !board[i]);
      if (corners.length) move = corners[Math.floor(Math.random() * corners.length)];
    }
    // Any
    if (move === -1) move = board.findIndex(c => !c);

    play(move, true);
  }

  function findWinMove(player) {
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for (const [a,b,c] of lines) {
      const vals = [board[a], board[b], board[c]];
      if (vals.filter(v => v === player).length === 2 && vals.includes('')) {
        return [a,b,c][vals.indexOf('')];
      }
    }
    return -1;
  }

  function checkWin(player) {
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for (const line of lines) {
      if (line.every(i => board[i] === player)) return line;
    }
    return null;
  }

  function endRound(result, winLine) {
    over = true;
    if (result === 'draw') {
      scores.d++;
      document.getElementById('status').textContent = "It's a draw";
    } else {
      scores[result.toLowerCase()]++;
      document.getElementById('status').textContent = result + ' wins!';
      // Highlight winning cells
      if (winLine) {
        const cells = document.getElementById('board').children;
        winLine.forEach(i => cells[i].classList.add('win'));
      }
    }
    updateScores();
  }

  function updateScores() {
    document.getElementById('xWins').textContent = scores.x;
    document.getElementById('oWins').textContent = scores.o;
    document.getElementById('draws').textContent = scores.d;
  }

  init();
</script>

<script src="/js/mini-player.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>

</body>
