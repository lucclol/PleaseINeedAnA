<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match - Evan's Playhouse</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .game-info {
    display: flex;
    gap: 32px;
    font-size: 14px;
  }

  .game-info span { color: var(--text-muted); }
  .game-info strong {
    color: var(--text-heading);
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    margin-left: 6px;
  }

  .memory-board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    max-width: 400px;
    width: 100%;
  }

  .memory-card {
    aspect-ratio: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--bg-card);
    user-select: none;
  }

  .memory-card:hover:not(.flipped):not(.matched) {
    background: var(--bg-card-hover);
    border-color: var(--border-light);
  }

  .memory-card.flipped {
    background: var(--bg-card-hover);
    border-color: var(--accent);
    color: var(--accent);
  }

  .memory-card.matched {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
    opacity: 0.7;
    cursor: default;
  }

  .win-msg {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--text-heading);
    display: none;
    text-align: center;
  }

  .win-msg.show { display: block; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <img src="https://image2url.com/r2/default/images/1773357779092-7021136d-cc9b-4c39-86c4-0bd0e1f2d877.png" alt="Logo">
      <span>Evan's Playhouse</span>
    </a>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">&#9776;</button>
    <ul class="nav-links">
      <li><a href="/" class="nav-home-btn" title="Home"><img src="https://image2url.com/r2/default/images/1773357603203-397429b5-5735-45d8-a9a0-c34c12fee80c.png" alt="Home"></a></li>
      <li><a href="/dashboard.html">Dashboard</a></li>
      <li><a href="/games.html" class="active">Games</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/tools.html">Tools</a></li>
      <li><a href="/guestbook.html">Guestbook</a></li>
    </ul>
  </div>
</nav>

<main class="page">
  <div class="page-header">
    <h1>Memory Match</h1>
    <p>Flip cards and find the matching pairs.</p>
  </div>

  <div class="game-container">
    <div class="game-info">
      <span>Moves <strong id="moves">0</strong></span>
      <span>Pairs <strong id="pairs">0 / 8</strong></span>
    </div>

    <div class="memory-board" id="board"></div>

    <div class="win-msg" id="winMsg">
      Nice! All pairs found.
    </div>

    <button class="btn btn-secondary" onclick="initGame()">New Game</button>
  </div>
</main>

<footer class="footer">Evan's Playhouse</footer>

<script>
  const symbols = ['A','B','C','D','E','F','G','H','J','K','L','M','N','P','Q','R'];
  let cards, flipped, matched, moves, locked;

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function initGame() {
    const picked = shuffle([...symbols]).slice(0, 8);
    cards = shuffle([...picked, ...picked]);
    flipped = [];
    matched = new Set();
    moves = 0;
    locked = false;
    document.getElementById('moves').textContent = '0';
    document.getElementById('pairs').textContent = '0 / 8';
    document.getElementById('winMsg').classList.remove('show');
    render();
  }

  function render() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    cards.forEach((sym, i) => {
      const card = document.createElement('div');
      card.className = 'memory-card';
      if (flipped.includes(i) || matched.has(i)) {
        card.classList.add(matched.has(i) ? 'matched' : 'flipped');
        card.textContent = sym;
      }
      card.addEventListener('click', () => flipCard(i));
      board.appendChild(card);
    });
  }

  function flipCard(i) {
    if (locked || flipped.includes(i) || matched.has(i)) return;
    if (flipped.length >= 2) return;

    flipped.push(i);
    render();

    if (flipped.length === 2) {
      moves++;
      document.getElementById('moves').textContent = moves;
      locked = true;

      const [a, b] = flipped;
      if (cards[a] === cards[b]) {
        matched.add(a);
        matched.add(b);
        flipped = [];
        locked = false;
        document.getElementById('pairs').textContent = (matched.size / 2) + ' / 8';
        render();

        if (matched.size === cards.length) {
          document.getElementById('winMsg').classList.add('show');
          const log = JSON.parse(localStorage.getItem('ep_activity') || '[]');
          log.push({ text: 'Completed Memory Match in ' + moves + ' moves', time: new Date().toISOString() });
          if (log.length > 50) log.splice(0, log.length - 50);
          localStorage.setItem('ep_activity', JSON.stringify(log));
        }
      } else {
        setTimeout(() => {
          flipped = [];
          locked = false;
          render();
        }, 800);
      }
    }
  }

  initGame();
</script>

</body>
</html>
