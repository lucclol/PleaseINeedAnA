<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evan's Playhouse</title>
<link rel="icon" type="image/png" href="https://image2url.com/r2/default/images/1773360165198-6e8b59b8-ece3-41af-bec4-d0f478f440c8.png">
<link rel="stylesheet" href="css/style.css">
<style>
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 60px);
    text-align: center;
    padding: 40px 24px;
  }

  .hero-img {
    width: clamp(140px, 22vw, 220px);
    height: auto;
    border-radius: var(--radius);
    margin-bottom: 28px;
    box-shadow: 0 8px 32px var(--shadow);
    border: 2px solid var(--border);
  }

  .hero h1 {
    font-size: clamp(36px, 7vw, 64px);
    margin-bottom: 16px;
    line-height: 1.2;
  }

  .hero p {
    color: var(--text-muted);
    font-size: clamp(15px, 2vw, 18px);
    max-width: 480px;
    margin-bottom: 40px;
    line-height: 1.7;
  }

  .hero-buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <img src="https://image2url.com/r2/default/images/1773360165198-6e8b59b8-ece3-41af-bec4-d0f478f440c8.png" alt="Logo">
      <span>Evan's Playhouse</span>
    </a>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">&#9776;</button>
    <ul class="nav-links">
      <li><a href="/" class="nav-home-btn" title="Home"><img src="https://image2url.com/r2/default/images/1773360165198-6e8b59b8-ece3-41af-bec4-d0f478f440c8.png" alt="Home"></a></li>
      <li><a href="/dashboard.html">Dashboard</a></li>
      <li><a href="/games.html">Games</a></li>
      <li><a href="/tools.html">Tools</a></li>
      <li><a href="/media-tools.html">Media Tools</a></li>
      <li><a href="/lounge.html">Lounge</a></li>
      <li><a href="/leaderboard.html">Leaderboard</a></li>
      <li><a href="/guestbook.html">Guestbook</a></li>
      <li><a href="/about.html">About</a></li>
    </ul>
  </div>
</nav>

<section class="hero">
  <img src="https://image2url.com/r2/default/images/1773359872295-7d3cfdcd-1085-4dd0-a508-349d063e7e1d.gif" alt="" class="hero-img anim-scale-in">
  <h1 class="anim-fade-up anim-delay-1">Welcome</h1>
  <p class="anim-fade-up anim-delay-2">Made by Evan Cruz</p>
  <div class="hero-buttons anim-fade-up anim-delay-3">
    <a href="/games.html" class="btn btn-primary">Browse Games</a>
    <a href="/lounge.html" class="btn btn-secondary">Sound Lounge</a>
    <a href="/dashboard.html" class="btn btn-secondary">Dashboard</a>
    <a href="/about.html" class="btn btn-secondary">About Me</a>
  </div>
</section>

<img src="https://image2url.com/r2/default/images/1773360165198-6e8b59b8-ece3-41af-bec4-d0f478f440c8.png" alt="" class="floating-logo">

<button class="settings-btn" onclick="document.querySelector('.settings-panel').classList.toggle('open')">&#9881;</button>
<div class="settings-panel">
  <h4>Settings</h4>
  <div class="theme-toggle">
    <button class="theme-option active" id="themeLight" onclick="setTheme('light')">Light</button>
    <button class="theme-option" id="themeDark" onclick="setTheme('dark')">Dark</button>
  </div>
</div>

<script>
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : '');
  localStorage.setItem('ep_theme', t);
  document.getElementById('themeLight').classList.toggle('active', t === 'light');
  document.getElementById('themeDark').classList.toggle('active', t === 'dark');
}
(function() {
  var saved = localStorage.getItem('ep_theme');
  if (saved === 'dark') setTheme('dark');
})();
</script>

<footer class="footer">
  Evan's Playhouse
</footer>

<script>
(function(){
  var els = document.querySelectorAll('.card,.reveal');
  els.forEach(function(el){el.style.opacity='0';el.style.transform='translateY(20px)';el.style.transition='opacity 0.6s ease, transform 0.6s ease';});
  var obs = new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)';obs.unobserve(e.target);}});},{threshold:0.1});
  els.forEach(function(el){obs.observe(el);});
})();
</script>

</body>
</html>
