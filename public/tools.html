<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tools - Evan's Lounge</title>
<script>
  var t = localStorage.getItem('ep_theme');
  if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
  else { document.documentElement.setAttribute('data-theme', 'dark'); }

<link rel="stylesheet" href="css/style.css">
<style>
  /* Todo List */
  .todo-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 24px;
  }

  .todo-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .todo-input-row input {
    flex: 1;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
  }

  .todo-input-row input:focus {
    border-color: var(--accent);
  }

  .todo-input-row input::placeholder {
    color: var(--text-muted);
  }

  .todo-list {
    list-style: none;
  }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }

  .todo-item:last-child { border-bottom: none; }

  .todo-item.done span {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .todo-item input[type="checkbox"] {
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  .todo-item span {
    flex: 1;
  }

  .todo-delete {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: all var(--transition);
  }

  .todo-delete:hover {
    color: #c97c7c;
    background: rgba(201, 124, 124, 0.1);
  }

  /* Pomodoro Timer */
  .timer-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 24px;
    text-align: center;
    margin-bottom: 24px;
  }

  .timer-display {
    font-family: 'Playfair Display', serif;
    font-size: clamp(56px, 10vw, 80px);
    color: var(--text-heading);
    margin-bottom: 8px;
    letter-spacing: 4px;
  }

  .timer-label {
    color: var(--text-muted);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 24px;
  }

  .timer-buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .timer-presets {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
  }

  .timer-preset {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 14px;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    transition: all var(--transition);
  }

  .timer-preset:hover, .timer-preset.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Journal */
  .journal-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 24px;
  }

  .journal-textarea {
    width: 100%;
    min-height: 200px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.7;
    outline: none;
    resize: vertical;
    margin-bottom: 12px;
  }

  .journal-textarea:focus {
    border-color: var(--accent);
  }

  .journal-textarea::placeholder {
    color: var(--text-muted);
  }

  .journal-entries {
    margin-top: 20px;
  }

  /* Notebook page-flip viewer */
  .journal-notebook {
    position: relative;
    perspective: 1200px;
    min-height: 280px;
  }

  .journal-page {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 24px;
    min-height: 220px;
    animation: pageIn 0.35s ease;
    transform-origin: left center;
    display: flex;
    flex-direction: column;
  }

  @keyframes pageIn {
    0% { opacity: 0; transform: rotateY(-12deg) scale(0.97); }
    100% { opacity: 1; transform: rotateY(0) scale(1); }
  }

  .journal-page-date {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .journal-page-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    margin-bottom: 12px;
  }

  .journal-page-img {
    max-width: 100%;
    max-height: 300px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }

  .journal-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    gap: 12px;
  }

  .journal-nav-btn {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 8px 16px;
    cursor: pointer;
    font-size: 14px;
    transition: all var(--transition);
  }

  .journal-nav-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }

  .journal-nav-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }

  .journal-page-counter {
    font-size: 13px;
    color: var(--text-muted);
  }

  .journal-page-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: auto;
    padding-top: 12px;
  }

  .journal-entry-delete {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 4px;
    transition: all var(--transition);
  }

  .journal-entry-delete:hover {
    color: #b57c7c;
    background: rgba(181, 124, 124, 0.1);
  }

  .journal-entry-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
  }

  .journal-entry-img {
    max-width: 100%;
    max-height: 300px;
    border-radius: var(--radius-sm);
    margin-top: 10px;
    border: 1px solid var(--border);
  }

  .journal-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .journal-img-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-surface);
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: all var(--transition);
    margin-right: 8px;
  }

  .journal-img-label:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .journal-img-preview {
    margin-top: 8px;
    margin-bottom: 8px;
  }

  .journal-img-preview img {
    max-width: 150px;
    max-height: 100px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }

  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 24px;
    align-items: start;
  }

  .tool-section h3 {
    font-size: 18px;
    margin-bottom: 16px;
  }
</style>
</head>

<main class="page">
  <a href="/" class="back-btn" data-transition="back">Home</a>
  <div class="page-header">
    <h1>Tools</h1>
    <p>Just some tools and what not.</p>
  </div>

  <div class="tools-grid">
    <!-- Pomodoro Timer -->
    <div class="tool-section">
      <h3>Pomodoro Timer</h3>
      <div class="timer-container">
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="timer-label" id="timerLabel">Focus Time</div>
        <div class="timer-buttons">
          <button class="btn btn-primary" id="timerStart" onclick="toggleTimer()">Start</button>

        <div class="timer-presets">
          <button class="timer-preset active" onclick="setPreset(25, this)">25 min</button>
          <button class="timer-preset" onclick="setPreset(15, this)">15 min</button>
          <button class="timer-preset" onclick="setPreset(5, this)">5 min</button>
          <button class="timer-preset" onclick="setPreset(1, this)">1 min</button>
        </div>
      </div>
    </div>

    <!-- Journal -->
    <div class="tool-section">
      <h3>Journal</h3>
      <div class="journal-container">
        <textarea class="journal-textarea" id="journalInput" placeholder="Write whatever's on your mind..."></textarea>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <label class="journal-img-label">
            Attach image
            <input type="file" id="journalImgInput" accept="image/*" style="display:none" onchange="previewJournalImg(this)">
          </label>
          <button class="btn btn-primary" onclick="addJournalEntry()">Save Entry</button>

        <div class="journal-entries" id="journalEntries">

            <button class="journal-nav-btn" id="journalPrev" onclick="flipPage(1)">&larr; Prev</button>
            <span class="journal-page-counter" id="journalCounter"></span>

          </div>
        </div>
      </div>

    <!-- Todo List -->
    <div class="tool-section" style="grid-column: 1 / -1;">
      <h3>To-Do List</h3>
      <div class="todo-container">

          <input type="text" id="todoInput" placeholder="Add something to do..." onkeydown="if(event.key==='Enter')addTodo()">
          <button class="btn btn-primary" onclick="addTodo()">Add</button>
        </div>
        <ul class="todo-list" id="todoList"></ul>
      </div>
    </div>
  </div>

<script>
  // =========== POMODORO ===========
  let timerSeconds = 25 * 60;
  let timerInterval = null;
  let timerRunning = false;
  let timerPreset = 25;

  function updateTimerDisplay() {
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    document.getElementById('timerDisplay').textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  function toggleTimer() {
    if (timerRunning) {
      clearInterval(timerInterval);
      timerRunning = false;
      document.getElementById('timerStart').textContent = 'Start';
    } else {
      timerRunning = true;
      document.getElementById('timerStart').textContent = 'Pause';
      timerInterval = setInterval(() => {
        if (timerSeconds <= 0) {
          clearInterval(timerInterval);
          timerRunning = false;
          document.getElementById('timerStart').textContent = 'Start';
          document.getElementById('timerLabel').textContent = 'Time is up!';
          logActivity('Completed a ' + timerPreset + ' min timer');
          return;
        }
        timerSeconds--;
        updateTimerDisplay();
      }, 1000);
    }
  }

  function resetTimer() {
    clearInterval(timerInterval);
    timerRunning = false;
    timerSeconds = timerPreset * 60;
    updateTimerDisplay();
    document.getElementById('timerStart').textContent = 'Start';
    document.getElementById('timerLabel').textContent = 'Focus Time';
  }

  function setPreset(mins, el) {
    timerPreset = mins;
    document.querySelectorAll('.timer-preset').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    resetTimer();
  }

  // =========== JOURNAL ===========
  let journalEntries = JSON.parse(localStorage.getItem('ep_journal') || '[]');
  let journalPendingImg = null;

  function previewJournalImg(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 500000) {
      // Resize large images to keep localStorage manageable
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        const maxW = 600;
        const scale = Math.min(1, maxW / img.width);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        journalPendingImg = canvas.toDataURL('image/jpeg', 0.7);
        document.getElementById('journalImgPreview').innerHTML = '<img src="' + journalPendingImg + '"> <button class="journal-entry-delete" onclick="clearJournalImg()">x</button>';
      };
      img.src = URL.createObjectURL(file);
    } else {
      const reader = new FileReader();
      reader.onload = function(e) {
        journalPendingImg = e.target.result;
        document.getElementById('journalImgPreview').innerHTML = '<img src="' + journalPendingImg + '"> <button class="journal-entry-delete" onclick="clearJournalImg()">x</button>';
      };
      reader.readAsDataURL(file);
    }
  }

  function clearJournalImg() {
    journalPendingImg = null;
    document.getElementById('journalImgPreview').innerHTML = '';
    document.getElementById('journalImgInput').value = '';
  }

  let journalPage = 0; // 0 = most recent

  function renderJournal() {
    const notebook = document.getElementById('journalNotebook');
    const nav = document.getElementById('journalNav');
    const reversed = journalEntries.slice().reverse();

    if (reversed.length === 0) {
      notebook.innerHTML = '<div class="journal-empty">No entries yet. Write your first one above!</div>';
      nav.style.display = 'none';
      return;
    }

    // Clamp page
    if (journalPage >= reversed.length) journalPage = reversed.length - 1;
    if (journalPage < 0) journalPage = 0;

    const entry = reversed[journalPage];
    const realIndex = journalEntries.length - 1 - journalPage;
    const date = new Date(entry.time);
    const dateStr = date.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
      + ' at ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    let html = '<div class="journal-page">'
      + '<div class="journal-page-date">' + dateStr + '</div>'
      + '<div class="journal-page-text">' + escHtml(entry.text) + '</div>';
    if (entry.img) {
      html += '<img class="journal-page-img" src="' + entry.img + '" alt="Journal image">';
    }
    html += '<div class="journal-page-actions"><button class="journal-entry-delete" onclick="deleteJournalEntry(' + realIndex + ')">Delete entry</button></div>';
    html += '</div>';
    notebook.innerHTML = html;

    // Nav
    nav.style.display = 'flex';
    document.getElementById('journalPrev').disabled = journalPage >= reversed.length - 1;
    document.getElementById('journalNext').disabled = journalPage <= 0;
    document.getElementById('journalCounter').textContent = (journalPage + 1) + ' / ' + reversed.length;
  }

  function flipPage(dir) {
    journalPage += dir;
    renderJournal();
  }

  function addJournalEntry() {
    const input = document.getElementById('journalInput');
    const text = input.value.trim();
    if (!text && !journalPendingImg) return;
    const entry = { text: text || '', time: new Date().toISOString() };
    if (journalPendingImg) entry.img = journalPendingImg;
    journalEntries.push(entry);
    try {
      localStorage.setItem('ep_journal', JSON.stringify(journalEntries));
    } catch(e) {
      alert('Storage full! Try removing old entries or using smaller images.');
      journalEntries.pop();
      return;
    }
    input.value = '';
    clearJournalImg();
    journalPage = 0;
    renderJournal();
    logActivity('Wrote a journal entry');
  }

  function deleteJournalEntry(i) {
    if (!confirm('Delete this journal entry?')) return;
    journalEntries.splice(i, 1);
    localStorage.setItem('ep_journal', JSON.stringify(journalEntries));
    if (journalPage > 0 && journalPage >= journalEntries.length) journalPage--;
    renderJournal();
  }

  renderJournal();

  // =========== TODO LIST ===========
  let todos = JSON.parse(localStorage.getItem('ep_todos') || '[]');

  function renderTodos() {
    const list = document.getElementById('todoList');
    list.innerHTML = '';
    if (todos.length === 0) {
      list.innerHTML = '<li class="todo-item"><span style="color:var(--text-muted)">Nothing yet. Add something above.</span></li>';
      return;
    }
    todos.forEach((t, i) => {
      const li = document.createElement('li');
      li.className = 'todo-item' + (t.done ? ' done' : '');
      li.innerHTML = '<input type="checkbox" ' + (t.done ? 'checked' : '') + ' onchange="toggleTodo(' + i + ')">'
        + '<span>' + escHtml(t.text) + '</span>'
        + '<button class="todo-delete" onclick="deleteTodo(' + i + ')">x</button>';
      list.appendChild(li);
    });
  }

  function addTodo() {
    const input = document.getElementById('todoInput');
    const text = input.value.trim();
    if (!text) return;
    todos.push({ text, done: false });
    saveTodos();
    renderTodos();
    input.value = '';
  }

  function toggleTodo(i) {
    todos[i].done = !todos[i].done;
    saveTodos();
    renderTodos();
  }

  function deleteTodo(i) {
    todos.splice(i, 1);
    saveTodos();
    renderTodos();
  }

  function saveTodos() {
    localStorage.setItem('ep_todos', JSON.stringify(todos));
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  renderTodos();

  // =========== ACTIVITY LOG ===========
  function logActivity(text) {
    const log = JSON.parse(localStorage.getItem('ep_activity') || '[]');
    log.push({ text, time: new Date().toISOString() });
    if (log.length > 50) log.splice(0, log.length - 50);
    localStorage.setItem('ep_activity', JSON.stringify(log));
  }
</script>
