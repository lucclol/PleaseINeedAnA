<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About - Evan's Playhouse</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .about-hero {
    position: relative;
    min-height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: -20px -24px 40px;
    padding: 60px 24px;
    border-radius: var(--radius);
    overflow: hidden;
  }

  .about-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  /* Desktop background */
  .about-bg {
    background-image: url('https://image2url.com/r2/default/images/1773357825017-b76fa5b6-230b-45e1-8ae3-7f8bc288e056.jpeg');
  }

  /* Phone background */
  @media (max-width: 600px) {
    .about-bg {
      background-image: url('https://image2url.com/r2/default/images/1773357844015-e3831007-8e6a-45ba-9721-8f8afd146660.jpg');
    }
  }

  .about-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(244, 241, 238, 0.2) 0%,
      rgba(244, 241, 238, 0.6) 60%,
      rgba(244, 241, 238, 0.95) 100%
    );
  }

  .about-content {
    position: relative;
    z-index: 1;
    max-width: 560px;
    text-align: center;
  }

  .about-content h1 {
    font-size: clamp(32px, 6vw, 52px);
    margin-bottom: 16px;
    color: var(--text-heading);
  }

  .about-content p {
    font-size: 16px;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 12px;
  }

  .about-details {
    margin-top: 40px;
  }

  .detail-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }

  .detail-row:last-child { border-bottom: none; }

  .detail-label {
    color: var(--text-muted);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    min-width: 120px;
    flex-shrink: 0;
  }

  .detail-value {
    color: var(--text-heading);
    font-size: 15px;
  }

  .about-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 24px;
  }

  .about-section h2 {
    font-size: 22px;
    margin-bottom: 16px;
  }

  .about-section p {
    color: var(--text-muted);
    line-height: 1.7;
  }

  .interests-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-top: 16px;
  }

  .interest-tag {
    background: var(--accent-dim);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    text-align: center;
    font-size: 13px;
    color: var(--text);
    transition: all var(--transition);
  }

  .interest-tag:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <img src="https://image2url.com/r2/default/images/1773357779092-7021136d-cc9b-4c39-86c4-0bd0e1f2d877.png" alt="Logo">
      <span>Evan's Playhouse</span>
    </a>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">&#9776;</button>
    <ul class="nav-links">
      <li><a href="/" class="nav-home-btn" title="Home"><img src="https://image2url.com/r2/default/images/1773357603203-397429b5-5735-45d8-a9a0-c34c12fee80c.png" alt="Home"></a></li>
      <li><a href="/dashboard.html">Dashboard</a></li>
      <li><a href="/games.html">Games</a></li>
      <li><a href="/about.html" class="active">About</a></li>
      <li><a href="/tools.html">Tools</a></li>
      <li><a href="/guestbook.html">Guestbook</a></li>
    </ul>
  </div>
</nav>

<main class="page">
  <div class="about-hero">
    <div class="about-bg"></div>
    <div class="about-content">
      <h1>Evan</h1>
      <p>Hi, i'm evan. I just add to this when im bored blehhh</p>
    </div>
  </div>

  <div class="about-section">
    <h2>About This Site</h2>
    <p>This is just a lounge with games and random stuff lol</p>
  </div>

  <div class="about-section">
    <h2>Interests</h2>
    <p>Some things I'm into:</p>
    <div class="interests-grid">
      <div class="interest-tag">Mewgenics</div>
      <div class="interest-tag">Roblox</div>
      <div class="interest-tag">Coding</div>
    </div>
  </div>
</main>

<img src="https://image2url.com/r2/default/images/1773357779092-7021136d-cc9b-4c39-86c4-0bd0e1f2d877.png" alt="" class="floating-logo">

<footer class="footer">Evan's Playhouse</footer>

</body>
</html>
