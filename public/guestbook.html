<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="https://image2url.com/r2/default/images/1773360165198-6e8b59b8-ece3-41af-bec4-d0f478f440c8.png">
<title>Guestbook - Evan's Playhouse</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body {
    background-image: url('https://image2url.com/r2/default/images/1773360140530-9e3dc47c-9bb5-44dd-ba63-b717b63e4494.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
  }

  .gb-form {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 32px;
  }

  .gb-form input,
  .gb-form textarea {
    width: 100%;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    margin-bottom: 12px;
    resize: vertical;
  }

  .gb-form input:focus,
  .gb-form textarea:focus {
    border-color: var(--accent);
  }

  .gb-form input::placeholder,
  .gb-form textarea::placeholder {
    color: var(--text-muted);
  }

  .gb-entries {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .gb-entry {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .gb-entry-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .gb-entry-name {
    font-weight: 600;
    color: var(--text-heading);
    font-size: 15px;
  }

  .gb-entry-date {
    font-size: 12px;
    color: var(--text-muted);
  }

  .gb-entry-msg {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
  }

  .gb-empty {
    text-align: center;
    color: var(--text-muted);
    padding: 40px;
    font-size: 15px;
  }

  .gb-clear {
    margin-top: 24px;
    text-align: center;
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <img src="https://image2url.com/r2/default/images/1773357779092-7021136d-cc9b-4c39-86c4-0bd0e1f2d877.png" alt="Logo">
      <span>Evan's Playhouse</span>
    </a>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">&#9776;</button>
    <ul class="nav-links">
      <li><a href="/" class="nav-home-btn" title="Home"><img src="https://image2url.com/r2/default/images/1773357603203-397429b5-5735-45d8-a9a0-c34c12fee80c.png" alt="Home"></a></li>
      <li><a href="/dashboard.html">Dashboard</a></li>
      <li><a href="/games.html">Games</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/tools.html">Tools</a></li>
      <li><a href="/media-tools.html">Media Tools</a></li>
      <li><a href="/guestbook.html" class="active">Guestbook</a></li>
    </ul>
  </div>
</nav>

<main class="page">
  <div class="page-header">
    <h1>Guestbook</h1>
    <p>Leave a message. Say whatever you want. It's saved in your browser.</p>
  </div>

  <div class="gb-form">
    <input type="text" id="gbName" placeholder="Your name" maxlength="50">
    <textarea id="gbMsg" rows="3" placeholder="Write something..." maxlength="500"></textarea>
    <button class="btn btn-primary" onclick="postEntry()">Post</button>
  </div>

  <div class="gb-entries" id="gbEntries">
    <div class="gb-empty">No entries yet. Be the first to sign!</div>
  </div>

  <div class="gb-clear">
    <button class="btn btn-secondary" onclick="if(confirm('Clear all entries?')){localStorage.removeItem('ep_guestbook');renderEntries();}">Clear All</button>
  </div>
</main>

<img src="https://image2url.com/r2/default/images/1773357779092-7021136d-cc9b-4c39-86c4-0bd0e1f2d877.png" alt="" class="floating-logo">

<footer class="footer">Evan's Playhouse</footer>

<script>
  let entries = JSON.parse(localStorage.getItem('ep_guestbook') || '[]');

  function renderEntries() {
    entries = JSON.parse(localStorage.getItem('ep_guestbook') || '[]');
    const container = document.getElementById('gbEntries');
    if (entries.length === 0) {
      container.innerHTML = '<div class="gb-empty">No entries yet. Be the first to sign!</div>';
      return;
    }
    container.innerHTML = '';
    entries.slice().reverse().forEach(e => {
      const div = document.createElement('div');
      div.className = 'gb-entry';
      const date = new Date(e.time);
      const dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      div.innerHTML = '<div class="gb-entry-header"><span class="gb-entry-name">' + escHtml(e.name) + '</span><span class="gb-entry-date">' + dateStr + '</span></div>'
        + '<div class="gb-entry-msg">' + escHtml(e.msg) + '</div>';
      container.appendChild(div);
    });
  }

  function postEntry() {
    const name = document.getElementById('gbName').value.trim() || 'Anonymous';
    const msg = document.getElementById('gbMsg').value.trim();
    if (!msg) return;
    entries.push({ name, msg, time: new Date().toISOString() });
    localStorage.setItem('ep_guestbook', JSON.stringify(entries));
    document.getElementById('gbName').value = '';
    document.getElementById('gbMsg').value = '';
    renderEntries();

    // Log activity
    const log = JSON.parse(localStorage.getItem('ep_activity') || '[]');
    log.push({ text: name + ' signed the guestbook', time: new Date().toISOString() });
    if (log.length > 50) log.splice(0, log.length - 50);
    localStorage.setItem('ep_activity', JSON.stringify(log));
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  renderEntries();
</script>

</body>
</html>
